<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather</title>
    <link rel="stylesheet" href="Weather.css">
    </link>
</head>

<body>
    <div id="Main-div">
        <div id="Main-div-part1">
            <input type="text" placeholder="📌 Enter city name" id="cityname" >
            <button id="search-btn" onclick="getweather()">🔍</button>

            <div id="weather-icon-div">
                <img src="Sun.png" alt="Weather Icon" id="weather-icon">

            </div>
            <h3 id="city">-.-</h3>
            <h1 id="temperature">--°C</h1>

            <div id="weather-description-div">
                <h2 id="weather-description">Today</h2>
            </div>

            <div id="all-weathers"></div>

        </div>


    </div>


    <div id="Main-div-part2"></div>

    </div>




    <script src="Weather.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather</title>
    <link rel="stylesheet" href="Weather.css">
    </link>
</head>

<body>
    <div id="Main-div">
        <div id="Main-div-part1">
            <input type="text" placeholder="📌 Enter city name" id="cityname">
            <button id="search-btn" >🔍</button>

            <div id="weather-icon-div">
                <h1 id="weather-icon">🌤️</h1>

            </div>
            <h3 id="city">-.-</h3>
            <h1 id="temperature">--°C</h1>
            
            <div id="high-low">
            <h2 id="high_text">High: --°C</h2>
            <h2 id="low_text">Low: --°C</h2>
            </div>

        </div>

        <div id="Main-div-part2">
            <h2>Today's Highlights</h2>

            <div id="details">

            <div class="box">

                <h2>Humidity</h2>
                <h1>💦</h1>
                <h3 id="Humidity">--.--</h3>
            </div>

            <div class="box">
                <h2>Feels Like</h2>
                <h1>☁︎</h1>
                <h3 id="feels_like">--.--</h3>

            </div>

            <div class="box">
                
                <h2>Wind Speed</h2>
                <h1>༄</h1>
                <h3 id="wind-speed">--.--</h3>
            </div>
            
            <div  class="box">
                <h2>Pressure</h2>
                <h1>🌡️</h1>
                <h3 id="Pressure">--.--</h3>
            </div>

            </div>

        </div>

    </div>



    




    <script src="Weather.js"></script>
</body>

</html>
